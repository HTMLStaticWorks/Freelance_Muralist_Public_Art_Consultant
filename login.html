<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Muralis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#f97316',
                        secondary: '#14b8a6',
                        dark: '#0f172a',
                        light: '#f8fafc'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300 antialiased min-h-screen flex items-center justify-center py-12 px-4 sm:px-6">

    <!-- Background Art element -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-primary/20 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-secondary/20 rounded-full blur-3xl"></div>
    </div>

    <!-- Toggles Top Right -->
    <div class="fixed top-6 right-6 flex space-x-2 z-50">
        <button id="rtl-toggle" class="p-2 rounded-full glass hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors shadow-sm">
            <i data-lucide="arrow-left-right" class="w-5 h-5 text-slate-600 dark:text-slate-300"></i>
        </button>
        <button id="theme-toggle" class="p-2 rounded-full glass hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors shadow-sm">
            <i data-lucide="moon" class="w-5 h-5 text-slate-600 dark:hidden"></i>
            <i data-lucide="sun" class="w-5 h-5 text-slate-300 hidden dark:block"></i>
        </button>
    </div>

    <!-- Centered Card -->
    <div class="glass w-full max-w-md p-8 sm:p-10 rounded-3xl shadow-2xl relative z-10 border border-slate-200/50 dark:border-slate-700/50 bg-white dark:bg-slate-800">
        
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 group mb-6">
                <i data-lucide="palette" class="text-primary w-8 h-8 group-hover:rotate-12 transition-transform"></i>
                <span class="font-display font-bold text-3xl tracking-tight text-slate-900 dark:text-white">Muralis</span>
            </a>
            <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Welcome back</h2>
            <p class="text-slate-500 text-sm mt-2">Please enter your details to sign in</p>
        </div>

        <form class="space-y-5" action="dashboard.html">
            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email Address</label>
                <input type="email" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-primary outline-none transition-all text-slate-900 dark:text-white" placeholder="you@example.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Password</label>
                <div class="relative">
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-primary outline-none transition-all text-slate-900 dark:text-white pr-12" placeholder="••••••••">
                    <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-primary">
                        <i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary dark:border-slate-600 dark:bg-slate-800">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-700 dark:text-slate-300">Remember me</label>
                </div>
                <div class="text-sm">
                    <a href="#" class="font-medium text-primary hover:text-orange-500 transition-colors">Forgot password?</a>
                </div>
            </div>

            <button type="submit" class="w-full bg-primary hover:bg-orange-600 text-white font-medium py-3 rounded-xl transition-all duration-300 transform hover:-translate-y-1 shadow-lg shadow-primary/30 hover:shadow-xl hover:shadow-primary/50">
                Log In
            </button>
        </form>

        <div class="mt-8 flex items-center justify-center">
            <span class="w-full border-t border-slate-300 dark:border-slate-600"></span>
            <span class="px-4 text-xs text-slate-500 uppercase tracking-widest bg-white dark:bg-slate-800">Or</span>
            <span class="w-full border-t border-slate-300 dark:border-slate-600"></span>
        </div>

        <div class="mt-6 flex gap-4">
            <button class="w-full flex items-center justify-center gap-2 border border-slate-300 dark:border-slate-600 py-2.5 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors text-slate-700 dark:text-slate-200 font-medium">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
            </button>
            <button class="w-full flex items-center justify-center gap-2 border border-slate-300 dark:border-slate-600 py-2.5 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors text-slate-700 dark:text-slate-200 font-medium">
                <i data-lucide="apple" class="w-5 h-5"></i>
                Apple
            </button>
        </div>

        <p class="text-center text-sm text-slate-500 mt-8">
            Don't have an account? <a href="signup.html" class="text-primary hover:underline font-medium">Sign up</a>
        </p>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
